<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spotter Digital — You don't have a marketing problem. You have a leak problem.</title>
<meta name="description" content="AI operations for local businesses. The average local business loses $80k+/yr to missed calls, dead reviews, and a slipping Google profile. Spotter plugs every leak — 24/7, on autopilot." />
<link rel="icon" href="assets/spotter-brand-kit/favicon/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="assets/spotter-brand-kit/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/spotter-brand-kit/favicon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/spotter-brand-kit/favicon/apple-touch-icon.png">
<link rel="manifest" href="assets/spotter-brand-kit/favicon/site.webmanifest">
<meta name="theme-color" content="#023E3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #faf3ec; color: #171717; }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html { scroll-behavior: smooth; }
  ::selection { background: #003837; color: #faf3ec; }
  a { color: inherit; }
  .sp-btn:hover { transform: translateY(-1px); }
  .sp-btn[style*="background: rgb(0, 56, 55)"]:hover { background: #004f4d !important; border-color: #004f4d !important; }
  input::placeholder { color: rgba(250, 243, 236, 0.5); }
  @keyframes sp-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
  }
  img { max-width: 100%; height: auto; }

  /* ============ MOBILE ============ */
  @media (max-width: 900px) {
    h1, h2 { font-size: clamp(34px, 9vw, 52px) !important; line-height: 1.05 !important; }
    h3 { font-size: clamp(22px, 5vw, 28px) !important; }
    nav ul { display: none !important; }

    /* Section padding: tighten horizontal, drop vertical */
    section { padding: 72px 20px !important; }

    /* Flatten any inline grid-template-columns to 1fr */
    [style*="grid-template-columns"] { grid-template-columns: 1fr !important; gap: 32px !important; }

    /* Flatten class-based grids */
    .sp-handle-cards,
    .sp-leaks-head,
    .sp-leaks-grid,
    .sp-footer-cols { grid-template-columns: 1fr !important; gap: 28px !important; }

    /* What-we-handle: category header flex (icon next to text) — keep but shrink */
    .sp-handle-header { gap: 16px !important; margin-bottom: 28px !important; }
    .sp-handle-header svg { width: 40px !important; height: 40px !important; flex-shrink: 0; }
    .sp-handle-header h3 { font-size: 16px !important; }
    .sp-handle-header p { font-size: 14px !important; }

    /* Card visual: simplify dramatically on mobile. */
    .sp-card-visual { height: auto !important; min-height: 0 !important; padding: 24px !important; display: flex !important; align-items: center !important; justify-content: center !important; }
    .sp-card-visual > div:not(.sp-card-keep) { display: none !important; }
    .sp-card-visual > .sp-card-keep { position: static !important; transform: none !important; width: 100% !important; max-width: 100% !important; left: auto !important; right: auto !important; top: auto !important; bottom: auto !important; margin: 0 !important; }

    /* Hero pad */
    .sp-hero { padding: 160px 20px 80px !important; }

    /* Demo card: stack mic+transcript */
    .sp-demo-grid { grid-template-columns: 1fr !important; }
    .sp-demo-stats { grid-template-columns: 1fr 1fr !important; }

    /* Footer brand block */
    .sp-footer-cols { grid-template-columns: 1fr 1fr !important; }

    /* Counter */
    .sp-leak-counter { text-align: left !important; }

    /* Hide decorative floating tag pills entirely on mobile */
    .sp-card-visual .sp-visual-tag { display: none !important; }

    /* Process steps: stack */
    .sp-process { grid-template-columns: 1fr !important; gap: 32px !important; }

    /* Section 05: hide the video placeholder entirely on mobile */
    .sp-process-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .sp-process-video { display: none !important; }
    .sp-process-left h2 { text-align: center !important; margin-bottom: 36px !important; }
    .sp-step-card { grid-template-columns: 1fr !important; text-align: center !important; gap: 14px !important; padding: 28px 22px !important; }
    .sp-step-card > div:first-child { margin: 0 auto !important; }
    .sp-step-card p { margin-left: auto !important; margin-right: auto !important; max-width: 360px !important; }

    /* Leaks counter sizing */
    .sp-leak-counter-num { font-size: clamp(56px, 14vw, 96px) !important; justify-content: flex-start !important; }

    /* Final CTA: stack the two buttons full-width instead of letting them wrap */
    .sp-cta-buttons { flex-direction: column !important; align-items: stretch !important; gap: 12px !important; }
    .sp-cta-buttons > a { justify-content: center !important; padding: 18px 24px !important; }
  }
  @media (max-width: 640px) {
    /* Once the nav is too tight, drop the "Talk to our AI →" link */
    .sp-nav-talk { display: none !important; }
  }
  @media (max-width: 520px) {
    section { padding: 56px 18px !important; }
    .sp-footer-cols { grid-template-columns: 1fr !important; }
    nav { padding: 14px 18px !important; }
    .sp-brand span { font-size: 18px !important; }
    .sp-brand img { height: 26px !important; width: 26px !important; }
  }
</style>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="assets/tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="what-we-handle.jsx"></script>
<script type="text/babel" src="sections2.jsx"></script>

<script type="text/babel" data-presets="env,react">
const SPOTTER_DEFAULTS = {
  "headlineEmphasis": "leak",
  "heroStyle": "editorial",
  "accentGreen": "#003837",
  "cream": "#faf3ec",
  "leakSpeed": 2.6,
  "showTicker": true,
  "capitalizeHeadlines": false
};

function App() {
  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', SPOTTER_DEFAULTS.accentGreen);
  }, []);

  return (
    <div style={{ background: SPOTTER_DEFAULTS.cream, minHeight: '100vh' }}>
      <NavBar />
      <Hero />
      <WhatWeHandleSection />
      <LeaksSection />
      <PlugSection />
      <WhySection />
      <ProcessSection />
      <FinalCTA />
      <Footer />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
