<svg viewBox="0 0 400 96" xmlns="http://www.w3.org/2000/svg">
  <!-- Spotter Digital — The Grip: Rounded Cradle (1A) -->
  
  <!-- Icon: Two cupped arcs cradling a circle -->
  <g transform="translate(10, 10)">
    <!-- Central circle (the "weight" / business being supported) -->
    <circle cx="36" cy="38" r="18" fill="#2B6B5E" opacity="0.12"/>
    <circle cx="36" cy="38" r="18" fill="none" stroke="#2B6B5E" stroke-width="3"/>
    
    <!-- Left cupping hand — single smooth arc -->
    <path d="M12 16 C4 26, 2 42, 10 56" stroke="#F4845F" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Right cupping hand -->
    <path d="M60 16 C68 26, 70 42, 62 56" stroke="#F4845F" stroke-width="5" stroke-linecap="round" fill="none"/>
    
    <!-- AI dot -->
    <circle cx="36" cy="38" r="4.5" fill="#2B6B5E"/>
  </g>
  
  <!-- Wordmark -->
  <text x="90" y="46" font-family="'Manrope', sans-serif" font-weight="700" font-size="30" fill="#1a1a1a" letter-spacing="-0.8">spotter</text>
  <text x="90" y="68" font-family="'Manrope', sans-serif" font-weight="400" font-size="14" fill="#2B6B5E" letter-spacing="3.5">DIGITAL</text>
</svg>
